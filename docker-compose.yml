services:
  frontend:
    build: .
    container_name: explora_plus_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true

volumes:
  node_modules:
